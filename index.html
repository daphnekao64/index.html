<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Jukebox</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #0f0c1b 0%, #201335 40%, #3a114d 70%, #631247 100%);
      background-attachment: fixed;
      color: #ffffff;
      margin: 0;
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      box-sizing: border-box;
    }
    .player-container {
      width: 100%;
      max-width: 420px;
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 25px;
      border-radius: 24px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    h2 { 
      font-weight: 700; font-size: 22px; margin-top: 0; margin-bottom: 25px; 
      background: linear-gradient(90deg, #ff71ce, #b967ff, #01cdfe);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .vinyl-box {
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background: radial-gradient(circle, #111 20%, #333 40%, #111 50%, #222 70%, #000 100%);
      border: 6px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6), 0 0 20px rgba(185, 103, 255, 0.2);
      margin-bottom: 35px;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      animation: spin 4s linear infinite;
    }
    .vinyl-center {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: linear-gradient(45deg, #ff71ce, #b967ff);
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 20px;
    }
    @keyframes spin {
      100% { transform: rotate(360deg); }
    }

    .playlist-buttons {
      display: flex;
      flex-direction: column;
      width: 100%;
      gap: 12px;
    }
    
    /* Styled links to look like beautiful buttons */
    .genre-btn {
      padding: 14px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.07);
      color: white;
      font-weight: 600;
      font-size: 15px;
      text-decoration: none;
      text-align: left;
      transition: background 0.2s, transform 0.1s, border-color 0.2s;
      display: block;
    }
    .genre-btn:hover {
      background: rgba(255, 255, 255, 0.16);
      border-color: rgba(185, 103, 255, 0.4);
    }
    .genre-btn:active {
      transform: scale(0.98);
    }
  </style>
</head>
<body>

  <div class="player-container">
    <h2>🎵 Ambient Jukebox</h2>
    
    <div class="vinyl-box">
      <div class="vinyl-center">💿</div>
    </div>

    <!-- Replaced buttons with pure standard HTML secure web links [G_1] -->
    <div class="playlist-buttons">
      <a class="genre-btn" href="https://youtu.be/s4-zUP6LAIo?si=6oJaU6Hv98Bm4yww" target="_blank" ?autoplay=1&mute=1>☕ 1.超好聽古箏竹笛旋律</a>
      <a class="genre-btn" href="https://youtu.be/pO_tXtnXmU0?si=N75uwinuDrUyzShT" target="_blank">🎹 2. 【安神急救】徵音入心</a>
      <a class="genre-btn" href="https://youtu.be/lmXzGBjI7ws?si=FHynzeEqBIWWEbkE" target="_blank">✨ 3. 宮音補土】脾胃不調急救</a>
      <a class="genre-btn" href="https://youtu.be/laN-Eu2U8uI?si=YCxQJMCj9ekANevf" target="_blank">🌸 4. 五音療愈合集</a>
      <a class="genre-btn" href="https://youtu.be/4YndJnc9QwA?si=8eSxAjZe4NXvI5BM" target="_blank">🪷 5. 徵音入心，中醫五音音療</a>
      <a class="genre-btn" href="https://youtu.be/1g4n7icpBN0?si=aKEgcGcoXZHc1zQF" target="_blank">🌧️ 6. 黃帝內經五音療疾</a>
     
    </div>
  </div>

</body>
</html>
