<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Jukebox</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #0f0c1b 0%, #201335 40%, #3a114d 70%, #631247 100%);
      background-attachment: fixed;
      color: #ffffff;
      margin: 0;
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      box-sizing: border-box;
    }
    .player-container {
      width: 100%;
      max-width: 420px;
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 25px;
      border-radius: 24px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    h2 { 
      font-weight: 700; font-size: 22px; margin-top: 0; margin-bottom: 20px; 
      background: linear-gradient(90deg, #ff71ce, #b967ff, #01cdfe);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    iframe {
      width: 100%; height: 260px; border-radius: 16px; border: none;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
      margin-bottom: 25px;
    }
    .playlist-buttons {
      display: flex;
      flex-direction: column;
      width: 100%;
      gap: 10px;
    }
    .genre-btn {
      padding: 12px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.08);
      color: white;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      text-align: left;
      transition: background 0.2s, transform 0.1s;
    }
    .genre-btn:hover {
      background: rgba(255, 255, 255, 0.18);
    }
    .genre-btn:active {
      transform: scale(0.98);
    }
  </style>
</head>
<body>

  <div class="player-container">
    <h2>🎵 Ambient Jukebox</h2>
    
    <!-- Restored back to the standard official youtube.com domain [G_1] -->
    <iframe 
      id="music-player"
      src="https://youtube.com" 
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
      allowfullscreen>
    </iframe>

    <div class="playlist-buttons">
      <button class="genre-btn" onclick="changePlaylist('PL4fGSI1pDJn6jEDf_M69w_Z67f0v8B_k8')">☕ 1. Chill Lo-Fi Beats</button>
      <button class="genre-btn" onclick="changePlaylist('PLMC9KNkIncVtDPuxkhM6X8wX14wYUt17y')">🎹 2. Gaming Soundtracks</button>
      <button class="genre-btn" onclick="changePlaylist('PL4fGSI1pDJn69Y4N4nZ6aOww_fA_5bM3_')">🌧️ 3. Rainy Jazz Cafe</button>
      <button class="genre-btn" onclick="changePlaylist('PL18_Wz_M-fH7uSIdM-8K11ZgZf-9Y98F8')">✨ 4. Pop Radio Hits</button>
      <button class="genre-btn" onclick="changePlaylist('PL4fGSI1pDJn7M_JpA-2NAsVvXv-PZf1qL')">🌸 5. Anime Chill Vibes</button>
    </div>
  </div>

  <script>
    function changePlaylist(playlistId) {
      const player = document.getElementById('music-player');
      player.src = `https://youtube.com{playlistId}&autoplay=1&mute=1`;
    }
  </script>

</body>
</html>
